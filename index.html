<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neocly AI OS SaaS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Neocly AI OS SaaS Dashboard</h1>
    <p>Run your acquisition and sales autopilot from one place.</p>
  </header>

  <main class="grid">
    <section class="card">
      <h2>System Controls</h2>
      <div class="row">
        <button id="initBtn">Initialize System</button>
        <button id="refreshBtn">Refresh Report</button>
      </div>
      <div class="row">
        <input id="seedCount" type="number" min="1" value="3000" />
        <button id="seedBtn">Seed Leads</button>
      </div>
      <div class="row">
        <input id="runDays" type="number" min="1" value="60" />
        <button id="runBtn">Run Days</button>
      </div>
      <div class="row">
        <button id="verifyBtn">Run Full Verification</button>
      </div>
      <pre id="status">Ready.</pre>
    </section>

    <section class="card">
      <h2>KPI Report</h2>
      <div id="kpi" class="kpi-grid"></div>
    </section>

    <section class="card span2">
      <h2>Verification Checkboxes</h2>
      <ul id="checks"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
