version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: neocly
      POSTGRES_USER: neocly
      POSTGRES_PASSWORD: neocly
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  api:
    build: ./production
    env_file: ./production/.env.example
    depends_on: [postgres, redis]
    ports: ["8000:8000"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: ./production
    env_file: ./production/.env.example
    depends_on: [postgres, redis]
    command: celery -A app.tasks worker -l info

volumes:
  pgdata:
